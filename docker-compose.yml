version: '3.9'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: joino_frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - joino_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: joino_backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://admin:secret@db:5432/joino
      - JWT_SECRET=${JWT_SECRET:-joino-dev-secret-key}
      - JWT_EXPIRES_IN=7d
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=http://localhost:4000/api/auth/google/callback
      - SMTP_HOST=mail
      - SMTP_PORT=1025
      - SMTP_FROM=noreply@joino.local
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=10485760
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      mail:
        condition: service_started
    restart: unless-stopped
    networks:
      - joino_network
    command: npm run dev

  db:
    image: postgres:16-alpine
    container_name: joino_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: joino
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d joino"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - joino_network

  mail:
    image: mailhog/mailhog
    container_name: joino_mail
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped
    networks:
      - joino_network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  joino_network:
    driver: bridge
